<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="micGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" />
  
  <!-- Microphone icon -->
  <g transform="translate(256, 256)">
    <!-- Microphone body -->
    <rect x="-24" y="-60" width="48" height="80" rx="24" fill="url(#micGradient)" />
    
    <!-- Microphone stand -->
    <path d="M -16 20 Q -16 40 0 40 Q 16 40 16 20" 
          stroke="url(#micGradient)" 
          stroke-width="8" 
          fill="none" 
          stroke-linecap="round" />
    
    <!-- Microphone base -->
    <rect x="-8" y="40" width="16" height="8" rx="4" fill="url(#micGradient)" />
    
    <!-- Sound waves -->
    <path d="M -40 -20 Q -50 -20 -50 0 Q -50 20 -40 20" 
          stroke="url(#micGradient)" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.7" />
    
    <path d="M 40 -20 Q 50 -20 50 0 Q 50 20 40 20" 
          stroke="url(#micGradient)" 
          stroke-width="6" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.7" />
    
    <!-- Inner waves -->
    <path d="M -56 -35 Q -70 -35 -70 0 Q -70 35 -56 35" 
          stroke="url(#micGradient)" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.5" />
    
    <path d="M 56 -35 Q 70 -35 70 0 Q 70 35 56 35" 
          stroke="url(#micGradient)" 
          stroke-width="4" 
          fill="none" 
          stroke-linecap="round"
          opacity="0.5" />
  </g>
  
  <!-- Text shadow effect -->
  <text x="256" y="440" 
        font-family="Inter, system-ui, sans-serif" 
        font-size="28" 
        font-weight="700" 
        text-anchor="middle" 
        fill="white"
        opacity="0.9">
    Shadowing
  </text>
  
  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="235" 
          stroke="white" 
          stroke-width="2" 
          fill="none" 
          opacity="0.3" />
</svg>